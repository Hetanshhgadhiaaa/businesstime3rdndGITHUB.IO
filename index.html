<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business Time AI</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f7f7f8;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#202123;
color:white;
display:flex;
flex-direction:column;
padding:10px;
}

.sidebar button{
margin:5px 0;
padding:10px;
border:none;
background:#343541;
color:white;
cursor:pointer;
border-radius:6px;
}

.chat-list{
flex-grow:1;
overflow-y:auto;
}

/* MAIN AREA */

.main{
flex-grow:1;
display:flex;
flex-direction:column;
align-items:center;
}

/* LOGO */

.logo{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

/* CHAT AREA */

#chatBox{
width:70%;
max-width:900px;
flex-grow:1;
overflow-y:auto;
margin-top:20px;
}

/* SEARCH AREA */

.search-container{
width:70%;
max-width:900px;
margin-bottom:40px;
display:flex;
gap:10px;
}

#chatInput{
flex-grow:1;
padding:15px;
font-size:16px;
border-radius:20px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
border:none;
background:#10a37f;
color:white;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="startNewChat()">+ New Chat</button>

<div class="chat-list" id="chatList"></div>

</div>

<!-- MAIN -->

<div class="main">

<div class="logo">Business Time AI</div>

<!-- CHAT MESSAGES -->

<div id="chatBox"></div>

<!-- MESSAGE INPUT -->

<div class="search-container">

<input id="chatInput" type="text" placeholder="Type your message">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
