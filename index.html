<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business Time AI</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f7f7f8;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

/* logo */

.logo{
font-size:32px;
font-weight:bold;
margin-top:40px;
}

/* chat area */

#chatBox{
width:70%;
max-width:900px;
margin-top:20px;
flex-grow:1;
overflow-y:auto;
}

/* messages */

.message{
padding:12px 16px;
margin:10px 0;
border-radius:12px;
max-width:70%;
}

.user{
background:#10a37f;
color:white;
margin-left:auto;
}

.ai{
background:white;
border:1px solid #ddd;
}

/* search container */

.search-container{
width:70%;
max-width:900px;
position:relative;
margin:20px 0 40px 0;
}

/* search bar */

.search-bar{
width:100%;
padding:20px;
font-size:18px;
border-radius:30px;
border:1px solid #ccc;
outline:none;
}

/* icons */

.icon{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:20px;
cursor:pointer;
}

.plus{
left:15px;
}

.mic{
right:60px;
}

.send{
right:20px;
}

/* feature menu */

.features{
display:none;
position:absolute;
bottom:70px;
left:0;
background:white;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
width:220px;
}

.features button{
width:100%;
margin:5px 0;
padding:10px;
border:none;
background:#f1f1f1;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="logo">Business Time AI</div>

<div id="chatBox"></div>

<div class="search-container">

<span class="icon plus" onclick="toggleFeatures()">➕</span>

<input
id="chatInput"
class="search-bar"
type="text"
placeholder="Ask anything..."
>

<span class="icon mic">🎤</span>

<span class="icon send" onclick="sendMessage()">➤</span>

<div id="featureMenu" class="features">

<button>🎧 Audio Answer</button>
<button>📝 Detailed Notes</button>
<button>🧠 Create Mind Map</button>
<button>🎨 Generate Image</button>

</div>

</div>

<script src="script.js"></script>

<script>

function toggleFeatures(){

const menu=document.getElementById("featureMenu")

menu.style.display =
menu.style.display==="block"
? "none"
: "block"

}

</script>

</body>

</html>
