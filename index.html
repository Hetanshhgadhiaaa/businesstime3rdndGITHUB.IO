<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business Time AI</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f7f7f8;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#202123;
color:white;
display:flex;
flex-direction:column;
padding:10px;
}

.sidebar button{
margin:5px 0;
padding:10px;
border:none;
background:#343541;
color:white;
cursor:pointer;
border-radius:6px;
}

.chat-list{
flex-grow:1;
overflow-y:auto;
}

/* MAIN AREA */

.main{
flex-grow:1;
display:flex;
flex-direction:column;
align-items:center;
}

/* LOGO */

.logo{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

/* CHAT */

#chatBox{
width:70%;
max-width:900px;
flex-grow:1;
overflow-y:auto;
margin-top:20px;
}

.message{
padding:12px 16px;
margin:10px 0;
border-radius:12px;
max-width:70%;
}

.user{
background:#10a37f;
color:white;
margin-left:auto;
}

.ai{
background:white;
border:1px solid #ddd;
}

/* SEARCH BAR */

.search-container{
width:70%;
max-width:900px;
position:relative;
margin:20px 0 40px 0;
}

.search-bar{
width:100%;
padding:20px;
border-radius:30px;
border:1px solid #ccc;
font-size:18px;
}

.icon{
position:absolute;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:20px;
}

.plus{ left:15px; }
.mic{ right:70px; }
.send{ right:30px; }

/* FEATURES MENU */

.features{
display:none;
position:absolute;
bottom:70px;
left:0;
background:white;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
width:250px;
}

.features button{
width:100%;
margin:5px 0;
padding:10px;
border:none;
background:#f1f1f1;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="startNewChat()">+ New Chat</button>

<div class="chat-list" id="chatList">
<!-- saved chats appear here -->
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="logo">Business Time AI</div>

<div id="chatBox"></div>

<div class="search-container">

<span class="icon plus" onclick="toggleFeatures()">➕</span>

<input
id="chatInput"
class="search-bar"
type="text"
placeholder="Ask anything..."
>

<span class="icon mic">🎤</span>

<span class="icon send" onclick="sendMessage()">➤</span>

<!-- FEATURES -->

<div id="featureMenu" class="features">

<button>📄 Upload Document</button>

<button>🎨 Generate Image</button>

<button>🧠 Create Mind Map</button>

<button>🔎 Research Mode</button>

<button>💻 Code Assistant</button>

<button>🎧 Audio Answer</button>

<button>📝 Detailed Notes</button>

<button>📤 Export Notes</button>

</div>

</div>

</div>

<script src="script.js"></script>

<script>

function toggleFeatures(){
const menu=document.getElementById("featureMenu")

menu.style.display =
menu.style.display==="block"
? "none"
: "block"
}

</script>

</body>

</html>
